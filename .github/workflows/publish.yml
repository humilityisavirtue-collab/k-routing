name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          cd openclaw && pip install -e ".[crypto]" && pip install pytest && python -m pytest tests/ -v

  publish-openclaw:
    name: Publish klaw-router
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build klaw-router
        run: |
          cd openclaw
          pip install hatchling
          python -m hatchling build

      - name: Publish klaw-router
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: openclaw/dist/
          skip-existing: true

  publish-openpod:
    name: Publish openpod
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build openpod
        run: |
          cd openpod
          pip install hatchling
          python -m hatchling build

      - name: Publish openpod
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: openpod/dist/
          skip-existing: true
