name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install openclaw (editable)
        run: |
          cd openclaw
          pip install -e ".[crypto]"
          pip install pytest

      - name: Run tests
        run: |
          cd openclaw
          python -m pytest tests/ -v --tb=short

      - name: Verify CLI entrypoint
        run: python -c "from klaw.router import KlawRouter; r = KlawRouter(); print('router OK')"
        working-directory: openclaw

      - name: Install openpod (editable)
        run: |
          cd openpod
          pip install -e .

      - name: Smoke-test openpod
        run: python -c "from openpod import Pod; print('openpod OK')"
